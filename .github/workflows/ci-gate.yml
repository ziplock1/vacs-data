name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      dataset: ${{ steps.filter.outputs.dataset }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            dataset:
              - "dataset/**"
              - "tools/**/*.rs"
              - "tools/**/Cargo.toml"
              - "tools/**/Cargo.lock"
              - ".github/workflows/ci-dataset.yml"
              - ".github/workflows/ci-gate.yml"
            rust:
              - "**/*.rs"
              - "**/Cargo.toml"
              - "**/Cargo.lock"
              - "**/deny.toml"
              - ".github/workflows/ci-rust.yml"
              - ".github/workflows/ci-gate.yml"

  dataset:
    needs: changes
    if: needs.changes.outputs.dataset == 'true'
    uses: ./.github/workflows/ci-dataset.yml
    permissions:
      contents: read

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    uses: ./.github/workflows/ci-rust.yml
    permissions:
      contents: read

  gate:
    name: "CI ✓"
    needs: [dataset, rust]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Evaluate results
        env:
          DATASET_RESULT: ${{ needs.dataset.result }}
          RUST_RESULT: ${{ needs.rust.result }}
        run: |
          failed=false
          for name in dataset rust; do
            var="${name^^}_RESULT"
            result="${!var}"
            case "$result" in
              success|skipped) echo "$name: $result" ;;
              *)               echo "::error::$name: $result"; failed=true ;;
            esac
          done

          if [[ "$failed" == "true" ]]; then
            echo ""
            echo "One or more required CI workflows failed."
            exit 1
          fi

          echo ""
          echo "All required checks passed or were skipped."

      - name: Summary
        if: always()
        env:
          DATASET_RESULT: ${{ needs.dataset.result }}
          RUST_RESULT: ${{ needs.rust.result }}
        run: |
          icon() { case "$1" in success) echo "✅";; skipped) echo "⏭️";; *) echo "❌";; esac }

          echo "### CI Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dataset | $(icon "$DATASET_RESULT") $DATASET_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust | $(icon "$RUST_RESULT") $RUST_RESULT |" >> $GITHUB_STEP_SUMMARY
