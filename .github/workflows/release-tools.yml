name: Release • Tools

on:
  push:
    tags:
      - "vacs-data-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (1.2.3, v1.2.3, or vacs-data-v1.2.3)"
        required: true
        type: string
      ref:
        description: "Git ref to build (branch/tag/SHA). Empty = default branch tip."
        required: false
        default: ""
        type: string

permissions: {}

defaults:
  run:
    shell: bash
    working-directory: tools

jobs:
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
      draft: ${{ steps.vars.outputs.draft }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
      release_name: ${{ steps.vars.outputs.release_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Resolve version & tag
        id: vars
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RAW="${INPUT_VERSION}"
          else
            RAW="${GITHUB_REF_NAME}"  # e.g. vacs-data-v1.2.3
          fi

          # Extract X.Y.Z from: 1.2.3 | v1.2.3 | vacs-data-v1.2.3 | 1.2.3-rc.1
          if [[ "$RAW" =~ ([0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?) ]]; then
            VER="${BASH_REMATCH[1]}"
          else
            echo "Could not parse semver from: $RAW" >&2
            exit 1
          fi

          TAG="vacs-data-v${VER}"
          REL_NAME="vacs-data: v${VER}"

          # Draft release when manual; published on tag-push
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            DRAFT=true
          else
            DRAFT=false
          fi

          # Mark prerelease if version contains a prerelease part (e.g., -rc.1)
          if [[ "$VER" =~ -[A-Za-z0-9] ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "version=$VER"       >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT"       >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "release_name=$REL_NAME" >> "$GITHUB_OUTPUT"

  generate-changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate a changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        id: git-cliff
        with:
          config: tools/cliff.toml
          args: -vv --latest --no-exec --github-repo ${{ github.repository }}

  licenses:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Install cargo-about
        run: cargo install cargo-about --locked

      - name: Generate third-party license file
        run: cargo about generate --workspace -o THIRD_PARTY_LICENSES.html about.hbs

      - name: Upload licenses artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: third-party-licenses
          path: tools/THIRD_PARTY_LICENSES.html
          if-no-files-found: error
          retention-days: 30

  build:
    needs: [prep]
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos-aarch64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ matrix.platform }}
          workspaces: "tools -> target"

      - name: Set binary name
        id: vars
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ needs.prep.outputs.version }}
        run: |
          EXT=""
          if [[ "$PLATFORM" == *"windows"* ]]; then
            EXT=".exe"
          fi

          echo "binary_name=vacs-data$EXT" >> "$GITHUB_OUTPUT"
          echo "release_binary_name=vacs-data-${VERSION}-${PLATFORM}$EXT" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: cargo build --release --locked --bin vacs-data --target ${{ matrix.target }}

      - name: Rename binary to include platform
        run: |
          mv "target/${{ matrix.target }}/release/${{ steps.vars.outputs.binary_name }}" "target/${{ matrix.target }}/release/${{ steps.vars.outputs.release_binary_name }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vacs-data-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 30
          path: |
            tools/target/${{ matrix.target }}/release/${{ steps.vars.outputs.release_binary_name }}

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: tools
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest build provenance
        if: ${{ !github.event.repository.private || github.event.repository.owner.type == 'Organization' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            tools/target/${{ matrix.target }}/release/${{ steps.vars.outputs.release_binary_name }}

      - name: Attest SBOM
        if: ${{ !github.event.repository.private || github.event.repository.owner.type == 'Organization' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            tools/target/${{ matrix.target }}/release/${{ steps.vars.outputs.release_binary_name }}
          sbom-path: sbom.spdx.json

  release:
    needs: [prep, generate-changelog, build, licenses]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: vacs-data-*
          merge-multiple: true

      - name: Download license file
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: third-party-licenses
          path: dist

      - name: Generate checksums
        working-directory: dist
        env:
          VERSION: ${{ needs.prep.outputs.version }}
        run: |
          out="SHA256SUMS-${VERSION}.txt"
          : > "$out"
          for f in *; do
            [[ "$f" == SHA256SUMS* || "$f" == *.html ]] && continue
            sum=$(shasum -a 256 "$f" | cut -d' ' -f1)
            echo "$sum  $f" >> "$out"
          done

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign checksums using Cosign with GitHub OIDC Token
        working-directory: dist
        env:
          VERSION: ${{ needs.prep.outputs.version }}
        run: |
          cosign sign-blob --yes \
            --bundle "SHA256SUMS-${VERSION}.txt.bundle.json" \
            "SHA256SUMS-${VERSION}.txt"

      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/SHA256SUMS-${{ needs.prep.outputs.version }}.txt

      - name: Create/update GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.prep.outputs.tag }}
          name: ${{ needs.prep.outputs.release_name }}
          draft: ${{ needs.prep.outputs.draft }}
          prerelease: ${{ needs.prep.outputs.prerelease }}
          make_latest: ${{ needs.prep.outputs.draft == 'false' && needs.prep.outputs.prerelease == 'false' }}
          body: ${{ needs.generate-changelog.outputs.release_body }}
          files: |
            dist/**
